site_name: Indexed Parquet Dataset
site_description: High-performance O(1) random access indexer for Parquet datasets in PyTorch
site_url: https://your-username.github.io/indexed-parquet-dataset/
repo_url: https://github.com/your-username/indexed-parquet-dataset/
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: ru
          name: Русский
          nav_translations:
            Home: Главная
            Tutorials: Обучение
            Quickstart: Быстрый старт
            Deep Learning Pipeline: Deep Learning Pipeline
            How-to Guides: Руководства
            Schema Evolution: Эволюция схем
            Materialization: Материализация
            Filtering and Sampling: Фильтрация и выборка
            Column Operations: Операции с колонками
            API Reference: Справочник API
            Overview: Обзор
            Explanation: Описание
            Architecture: Архитектура
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true


nav:
  - Home: index.md
  - Tutorials:
    - Quickstart: tutorials/quickstart.md
    - Deep Learning Pipeline: tutorials/deep_learning.md
  - How-to Guides:
    - Schema Evolution: how-to/schema-evolution.md
    - Materialization: how-to/materialization.md
    - Filtering and Sampling: how-to/filtering.md
    - Column Operations: how-to/column-ops.md
  - API Reference:
    - Overview: reference/api.md
  - Explanation:
    - Architecture: explanation/architecture.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
