name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # To use Trusted Publishing (recommended):
        # 1. Configure the repository on PyPI: https://docs.pypi.org/trusted-publishers/
        # 2. No token is needed here.
        
        # If using legacy tokens:
        # password: ${{ secrets.PYPI_API_TOKEN }}
        print-hash: true
